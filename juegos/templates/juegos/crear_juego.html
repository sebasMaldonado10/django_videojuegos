{% extends './base.html' %}

{% block title %} Crear juego {% endblock %}

{% block body %}
    <section class="bg-zinc-300 gap-6 px-10 py-5 flex flex-col justify-center items-center text-center">
        <h1 class="font-lg text-xl font-bold py-5">
            Agregar juego
        </h1>

        <form class="flex flex-col items-start gap-5 border border-black p-5 rounded-lg bg-zinc-400" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="border border-black p-2 rounded-lg bg-zinc-200" type="submit">Guardar</button>
        </form>

    </section>
    
{% endblock %}
