{% extends 'juegos/base.html' %}

{% block title %} Login {% endblock %}

{% block body %}
    <section class="bg-zinc-300 gap-6 px-10 py-5 flex flex-col justify-center items-center text-center">
        <h1 class="text-blue-500 font-lg text-xl font-bold py-5">
            Inciar Sesion
        </h1>

        <form class="flex flex-col items-start gap-5 border border-black p-5 rounded-lg bg-zinc-600" method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="text-blue-500 text-lg border border-black transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 p-2 rounded-lg bg-zinc-200" type="submit">Guardar</button>
        </form>
        <a class="text-blue-500" href="{% url 'register' %}">No tienes cuenta? Registrarse</a>
    </section>
    
{% endblock %}
